server:
  port: 8081

spring:
  application:
    name: api-gateway
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  main:
    web-application-type: reactive
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/universitymanagementrealm
      client:
        registration:
          keycloak:
            client-id: university_client
            client-secret: CCLqRQlTzSOWbLxWs7NG83XhEatwTWQK
            scope: openid,profile
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/swagger-ui/oauth2-redirect.html"
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/universitymanagementrealm
  cloud:
    gateway:
      default-filters:
        - PreserveHostHeader
      routes:
        - id: auth-service
          uri: http://localhost:8082
          predicates:
            - Path=/auth/**
        - id: auth-docs
          uri: http://localhost:8082
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - RewritePath=/v3/api-docs/auth,/v3/api-docs
        - id: student-service
          uri: http://localhost:8083
          predicates:
            - Path=/student/**
          filters:
            - TokenRelay
        - id: student-docs
          uri: http://localhost:8083
          predicates:
            - Path=/v3/api-docs/student
          filters:
            - RewritePath=/v3/api-docs/student,/v3/api-docs
        - id: faculty-service
          uri: http://localhost:8084
          predicates:
            - Path=/faculty/**
          filters:
            - TokenRelay
        - id: faculty-docs
          uri: http://localhost:8084
          predicates:
            - Path=/v3/api-docs/faculty
          filters:
            - RewritePath=/v3/api-docs/faculty,/v3/api-docs
springdoc:
  swagger-ui:
    persist-authorization: true
    disable-swagger-default-url: true
    oauth:
      client-id: university_client
      client-secret: CCLqRQlTzSOWbLxWs7NG83XhEatwTWQK
      use-pkce-with-authorization-code-grant: true
    urls:
      - name: auth-service
        url: /v3/api-docs/auth
      - name: student-service
        url: /v3/api-docs/student
      - name: faculty-service
        url: /v3/api-docs/faculty

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  codec:
    max-in-memory-size: 10MB
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics